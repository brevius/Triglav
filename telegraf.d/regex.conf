###############################################################################
#                               REGEX PLUGIN                                  #
###############################################################################

[[processors.regex]]
  order = 200
  [[processors.regex.tags]]
    key = "device"
    pattern = "([^.]+).*"
    replacement = "${1}"

# Merge FPC with sensor name
[[processors.regex]]
  order = 210
  namepass = ["TEMP"]
## Append temp_sensor_name to sensor tag
  [[processors.regex.tags]]
    key = "temp_sensor_name"
    pattern = "(.*)"
    replacement = "-${1}"
    result_key = "sensor"
    append = true

# Replace spaces in PROPERTIES fielsd
[[processors.regex]]
  order = 212
#  namepass = ["PROPERTIES"]
  [[processors.regex.field_rename]]
    pattern = "\\s"
    replacement = "_"
  [[processors.regex.field_rename]]
    pattern = "-"
    replacement = "_"
